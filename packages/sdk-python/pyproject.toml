[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "causal-sdk"
version = "0.1.0"
description = "Causal SDK — automatic provenance capture for AI agent engineering teams"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
keywords = ["llm", "agents", "observability", "root-cause-analysis"]
dependencies = [
    "httpx>=0.27.0",
    "pydantic>=2.0.0",
    "python-dotenv>=1.0.0",
    "uuidv7>=0.1.0",
]

[project.optional-dependencies]
langgraph = [
    "langgraph>=0.2.0",
    "langchain-core>=0.3.0",
]
boto3 = ["boto3>=1.35.0"]
all = ["causal-sdk[langgraph,boto3]"]

[project.scripts]
causal = "causal_sdk.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["causal_sdk"]

[tool.ruff]
line-length = 100
target-version = "py310"
