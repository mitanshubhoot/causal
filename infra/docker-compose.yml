version: "3.9"

services:
  neo4j:
    image: neo4j:5.23-community
    container_name: causal-neo4j
    ports:
      - "7474:7474"   # HTTP (Neo4j Browser)
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: neo4j/causal_dev_password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./neo4j/schema.cypher:/docker-entrypoint-initdb.d/schema.cypher
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "causal_dev_password", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: timescale/timescaledb-ha:pg16-latest
    container_name: causal-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: causal
      POSTGRES_USER: causal
      POSTGRES_PASSWORD: causal_dev_password
    volumes:
      - postgres_data:/home/postgres/pgdata/data
      - ./postgres/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U causal -d causal"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    container_name: causal-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: causal-minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: causal-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/causal-snapshots;
      mc policy set private local/causal-snapshots;
      echo 'MinIO bucket created';
      "

volumes:
  neo4j_data:
  neo4j_logs:
  postgres_data:
  redis_data:
  minio_data:
